<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 전문인재 기획서 대시보드</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Fuse.js for lightweight local search -->
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --card-hover: rgba(51, 65, 85, 0.8);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15), transparent 25%);
            background-attachment: fixed;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar styling */
        .sidebar {
            width: 320px;
            background: var(--glass-bg);
            border-right: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            height: 100%;
            z-index: 10;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--glass-border);
        }

        .sidebar-header h1 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-header p {
            margin: 8px 0 0 0;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .item-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .list-item {
            padding: 16px;
            margin-bottom: 8px;
            border-radius: 12px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s ease;
        }

        .list-item:hover {
            background: var(--card-hover);
        }

        .list-item.active {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.1);
        }

        .list-item-title {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 4px;
        }

        .list-item-org {
            font-size: 0.8rem;
            color: var(--accent-hover);
        }

        /* Main content area styling */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 40px;
            position: relative;
        }

        .content-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 32px;
            backdrop-filter: blur(12px);
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            display: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .content-card.active {
            display: block;
        }

        .content-header {
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--glass-border);
        }

        .content-header h2 {
            margin: 0 0 8px 0;
            font-size: 1.8rem;
        }

        .content-header a {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            transition: color 0.2s;
        }

        .content-header a:hover {
            color: var(--accent-hover);
            text-shadow: 0 0 8px var(--accent-glow);
        }

        /* Section Styling */
        .section {
            margin-bottom: 32px;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .section h3 {
            margin: 0 0 16px 0;
            font-size: 1.1rem;
            color: #a78bfa;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section h3::before {
            content: '';
            display: block;
            width: 4px;
            height: 16px;
            background: var(--accent);
            border-radius: 2px;
        }

        .section-content {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #cbd5e1;
            white-space: pre-wrap;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            text-align: center;
        }

        .empty-state h2 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Loader */
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Chatbot UI */
        .chat-widget {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .chat-toggle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-toggle:hover {
            transform: scale(1.1);
        }

        .chat-window {
            width: 380px;
            height: 550px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            backdrop-filter: blur(16px);
            margin-bottom: 20px;
            display: none;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            overflow: hidden;
            transform-origin: bottom right;
            animation: chatOpen 0.3s ease;
        }

        .chat-window.open {
            display: flex;
        }

        .chat-header {
            padding: 16px 20px;
            background: rgba(15, 23, 42, 0.6);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h3 {
            margin: 0;
            font-size: 1rem;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-header h3 span {
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 10px;
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .chat-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chat-msg {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 0.9rem;
            line-height: 1.5;
            word-break: break-word;
        }

        .msg-bot {
            align-self: flex-start;
            background: rgba(51, 65, 85, 0.6);
            border-bottom-left-radius: 4px;
            color: #cbd5e1;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .msg-user {
            align-self: flex-end;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.8), rgba(96, 165, 250, 0.8));
            border-bottom-right-radius: 4px;
            color: #fff;
        }

        .chat-footer {
            padding: 16px;
            background: rgba(15, 23, 42, 0.4);
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 8px;
        }

        .chat-input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 10px 16px;
            color: #fff;
            font-family: inherit;
            outline: none;
        }

        .chat-input:focus {
            border-color: rgba(59, 130, 246, 0.5);
            background: rgba(255,255,255,0.1);
        }

        .chat-send {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .chat-send:hover {
            background: var(--accent-hover);
        }

        .action-link {
            color: #60a5fa;
            text-decoration: underline;
            cursor: pointer;
            font-weight: 600;
            display: inline-block;
            margin-top: 8px;
        }
        
        .insight-tag {
            font-size:0.75rem; 
            color:#94a3b8; 
            display:block; 
            margin-bottom:8px;
            background: rgba(0,0,0,0.2);
            padding: 6px 10px;
            border-radius: 6px;
            border-left: 3px solid #8b5cf6;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h1>2026 AX 과제기획서</h1>
            <p id="total-count">데이터 불러오는 중...</p>
        </div>
        <div class="item-list" id="item-list">
            <div class="loader" id="list-loader"></div>
        </div>
    </div>

    <div class="main-content">
        <div class="empty-state" id="empty-state">
            <h2>기획서 대시보드</h2>
            <p>좌측 목록에서 지원자를 선택하거나,<br>우측 하단 챗봇에게 물어보세요!</p>
        </div>
        
        <div class="content-card" id="content-card">
            <div class="content-header">
                <h2 id="detail-title">제목</h2>
                <a id="detail-link" href="#" target="_blank">원본 마크다운 파일 보기 →</a>
            </div>
            
            <div id="detail-sections">
                <!-- Sections will be injected here -->
            </div>
        </div>
    </div>

    <!-- Chatbot Widget -->
    <div class="chat-widget">
        <div class="chat-window" id="chat-window">
            <div class="chat-header">
                <h3>🤖 인사이트 봇 <span>Eco-friendly</span></h3>
                <button onclick="toggleChat()" style="background:none;border:none;color:white;cursor:pointer;">✕</button>
            </div>
            <div class="chat-body" id="chat-body">
                <div class="chat-msg msg-bot">
                    안녕하세요! 무엇이든 물어보세요.<br>
                    <span class="insight-tag">💡 LLM API 없이, 브라우저 내부의 가벼운 검색 알고리즘(Fuse.js)만으로 동작하는 친환경 챗봇입니다.</span>
                    <i>"홍길동은 무슨 과제를 했어?"</i> 처럼 자연스럽게 물어보세요!
                </div>
            </div>
            <div class="chat-footer">
                <input type="text" class="chat-input" id="chat-input" placeholder="이름이나 키워드를 검색해보세요..." onkeypress="if(event.key === 'Enter') handleChat()">
                <button class="chat-send" onclick="handleChat()">➤</button>
            </div>
        </div>
        <button class="chat-toggle" onclick="toggleChat()">💬</button>
    </div>

    <script>
        let allItemsData = [];
        let fuse;

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                // Fetch RSS feed
                const response = await fetch('rss.xml');
                const text = await response.text();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(text, "text/xml");
                
                const items = Array.from(xmlDoc.querySelectorAll('item'));
                document.getElementById('list-loader').style.display = 'none';
                document.getElementById('total-count').textContent = `총 ${items.length}명의 후보자`;
                
                const listContainer = document.getElementById('item-list');
                
                items.forEach((item, index) => {
                    const title = item.querySelector('title')?.textContent || '제목 없음';
                    const link = item.querySelector('link')?.textContent || '#';
                    
                    const tags = {
                        motivation: item.querySelector('motivation')?.textContent || '',
                        experience: item.querySelector('experience')?.textContent || '',
                        plan: item.querySelector('plan')?.textContent || '',
                        project_proposal: item.querySelector('project_proposal')?.textContent || '',
                        leadership_plan: item.querySelector('leadership_plan')?.textContent || ''
                    };
                    
                    let org = "";
                    let name = title;
                    const match = title.match(/\[(.*?)\] (.*?) -/);
                    if(match) {
                        org = match[1];
                        name = match[2].trim();
                    }

                    // Save for Search
                    allItemsData.push({
                        id: `item_${index}`,
                        title: title,
                        name: name,
                        org: org,
                        motivation: tags.motivation,
                        experience: tags.experience,
                        plan: tags.plan,
                        project_proposal: tags.project_proposal,
                        leadership_plan: tags.leadership_plan,
                        link: link,
                        tags: tags
                    });

                    // Create list element
                    const li = document.createElement('div');
                    li.className = 'list-item';
                    li.id = `list-item-${index}`;
                    li.innerHTML = `
                        <div class="list-item-title">${name}</div>
                        <div class="list-item-org">${org}</div>
                    `;
                    
                    li.addEventListener('click', () => {
                        openProfile(index);
                    });
                    
                    listContainer.appendChild(li);
                });

                // Initialize Fuse.js for Search
                const options = {
                    includeScore: true,
                    threshold: 0.4, // Lower is more strict
                    ignoreLocation: true,
                    keys: [
                        { name: 'name', weight: 0.6 },
                        { name: 'org', weight: 0.2 },
                        { name: 'project_proposal', weight: 0.1 },
                        { name: 'experience', weight: 0.1 }
                    ]
                };
                fuse = new Fuse(allItemsData, options);
                
            } catch (error) {
                console.error("Error loading RSS:", error);
                document.getElementById('total-count').textContent = "데이터를 불러오는데 실패했습니다.";
                document.getElementById('list-loader').style.display = 'none';
            }
        });

        // Toggle Chat Window
        function toggleChat() {
            const chatWin = document.getElementById('chat-window');
            chatWin.classList.toggle('open');
            if(chatWin.classList.contains('open')) {
                document.getElementById('chat-input').focus();
            }
        }

        function addChatMessage(text, isUser = false) {
            const body = document.getElementById('chat-body');
            const msg = document.createElement('div');
            msg.className = 'chat-msg ' + (isUser ? 'msg-user' : 'msg-bot');
            msg.innerHTML = text; 
            body.appendChild(msg);
            body.scrollTop = body.scrollHeight;
        }

        // Handle Chatbot Search Logic
        function handleChat() {
            const input = document.getElementById('chat-input');
            const query = input.value.trim();
            if(!query) return;
            
            addChatMessage(query, true);
            input.value = '';
            
            setTimeout(() => {
                // Natural Language "Fake" parsing by removing stop words
                const stopWords = ["은", "는", "이", "가", "어떤", "무슨", "일을", "했어", "알려줘", "뭐야", "뭐해", "과제", "기획서", "보여줘", "누구야"];
                let cleanQuery = query;
                stopWords.forEach(w => {
                    cleanQuery = cleanQuery.replace(new RegExp(w, 'g'), ' ');
                });
                cleanQuery = cleanQuery.trim();
                if(cleanQuery === '') cleanQuery = query;
                
                const results = fuse.search(cleanQuery);
                
                if(results.length > 0) {
                    const bestMatch = results[0].item;
                    const index = allItemsData.findIndex(d => d.id === bestMatch.id);
                    
                    let response = `<b>${bestMatch.name}</b>(${bestMatch.org}) 님의 정보가 가장 매칭됩니다!<br>`;
                    
                    // Add an insight message rarely or conditionally to emphasize the point
                    if(Math.random() > 0.5) {
                        response += `<span class="insight-tag">💡 무거운 백엔드 LLM 없이, 브라우저 단에서 정규식과 로컬 검색(Fuse.js)만으로도 훌륭한 응답을 흉내낼 수 있습니다. "오버엔지니어링"을 피하는 것이 진정한 실력 아닐까요? 😉</span>`;
                    }

                    // Extract a snippet from project proposal
                    let snippet = bestMatch.project_proposal.substring(0, 80).replace(/#/g, '').replace(/\n/g, ' ').trim();
                    if(snippet) {
                        response += `<br><b>주요 기획 내용:</b><br><i>"${snippet}..."</i><br>`;
                    }
                    
                    response += `<span class="action-link" onclick="openProfile(${index})">👉 상세 내용 화면에 띄우기</span>`;
                    
                    addChatMessage(response);
                } else {
                    addChatMessage(`음... '${query}'와 관련된 지원자를 찾지 못했습니다. 이름이나 소속 기관명을 정확히 입력해 보시겠어요? 🥲<br><span class="insight-tag">💡 로컬 검색의 한계입니다. 맥락 추론이 필요할 때 비로소 진짜 LLM을 꺼내들면 됩니다!</span>`);
                }
            }, 500); // 0.5s delay to make it feel like AI typing
        }

        // Open Profile in Main View
        window.openProfile = function(index) {
            // Remove active classes
            document.querySelectorAll('.list-item').forEach(el => el.classList.remove('active'));
            
            // Add active class to selected
            const activeLi = document.getElementById(`list-item-${index}`);
            if(activeLi) {
                activeLi.classList.add('active');
                activeLi.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
            
            const data = allItemsData[index];
            showDetails(data.title, data.link, data.tags);
        }

        function showDetails(title, link, tags) {
            document.getElementById('empty-state').style.display = 'none';
            const card = document.getElementById('content-card');
            
            card.classList.remove('active');
            void card.offsetWidth; 
            card.classList.add('active');
            
            document.getElementById('detail-title').textContent = title;
            document.getElementById('detail-link').href = link;
            
            const sectionsContainer = document.getElementById('detail-sections');
            sectionsContainer.innerHTML = ''; 
            
            const sectionMap = [
                { id: 'motivation', label: '1. 지원동기' },
                { id: 'experience', label: '2. AI·데이터분석 활용 경력 및 실적' },
                { id: 'plan', label: '3. 데이터 분석·AI활용 계획' },
                { id: 'project_proposal', label: '4. 실전 AX 과제 기획서' },
                { id: 'leadership_plan', label: '5. AI·데이터 거점리더 활동계획' }
            ];
            
            sectionMap.forEach(sec => {
                const content = tags[sec.id];
                if(content && content.trim().length > 0) {
                    const sectionEl = document.createElement('div');
                    sectionEl.className = 'section';
                    
                    let cleanContent = content.trim();
                    cleanContent = cleanContent.replace(/^#+\s+.*?\n/, '');
                    
                    sectionEl.innerHTML = `
                        <h3>${sec.label}</h3>
                        <div class="section-content">${escapeHTML(cleanContent)}</div>
                    `;
                    sectionsContainer.appendChild(sectionEl);
                }
            });
            
            if(sectionsContainer.innerHTML === '') {
                sectionsContainer.innerHTML = '<div class="section"><div class="section-content">상세 내용이 파싱되지 않았거나 비어있습니다. 원본 마크다운 파일을 참조해주세요.</div></div>';
            }
        }
        
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag])
            );
        }
    </script>
</body>
</html>
