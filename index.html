<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 전문인재 기획서 대시보드</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --card-hover: rgba(51, 65, 85, 0.8);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15), transparent 25%);
            background-attachment: fixed;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar styling */
        .sidebar {
            width: 320px;
            background: var(--glass-bg);
            border-right: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            height: 100%;
            z-index: 10;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--glass-border);
        }

        .sidebar-header h1 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-header p {
            margin: 8px 0 0 0;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .item-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .list-item {
            padding: 16px;
            margin-bottom: 8px;
            border-radius: 12px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s ease;
        }

        .list-item:hover {
            background: var(--card-hover);
        }

        .list-item.active {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.1);
        }

        .list-item-title {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 4px;
        }

        .list-item-org {
            font-size: 0.8rem;
            color: var(--accent-hover);
        }

        /* Main content area styling */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 40px;
            position: relative;
        }

        .content-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 32px;
            backdrop-filter: blur(12px);
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            display: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .content-card.active {
            display: block;
        }

        .content-header {
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--glass-border);
        }

        .content-header h2 {
            margin: 0 0 8px 0;
            font-size: 1.8rem;
        }

        .content-header a {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            transition: color 0.2s;
        }

        .content-header a:hover {
            color: var(--accent-hover);
            text-shadow: 0 0 8px var(--accent-glow);
        }

        /* Section Styling */
        .section {
            margin-bottom: 32px;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .section h3 {
            margin: 0 0 16px 0;
            font-size: 1.1rem;
            color: #a78bfa;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section h3::before {
            content: '';
            display: block;
            width: 4px;
            height: 16px;
            background: var(--accent);
            border-radius: 2px;
        }

        .section-content {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #cbd5e1;
            white-space: pre-wrap;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            text-align: center;
        }

        .empty-state h2 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Loader */
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h1>2026 AX 과제기획서</h1>
            <p id="total-count">데이터 불러오는 중...</p>
        </div>
        <div class="item-list" id="item-list">
            <div class="loader" id="list-loader"></div>
        </div>
    </div>

    <div class="main-content">
        <div class="empty-state" id="empty-state">
            <h2>기획서 대시보드</h2>
            <p>좌측 목록에서 지원자를 선택하여<br>상세 기획서 내용을 확인하세요.</p>
        </div>
        
        <div class="content-card" id="content-card">
            <div class="content-header">
                <h2 id="detail-title">제목</h2>
                <a id="detail-link" href="#" target="_blank">원본 마크다운 파일 보기 →</a>
            </div>
            
            <div id="detail-sections">
                <!-- Sections will be injected here -->
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                // Fetch RSS feed
                const response = await fetch('rss.xml');
                const text = await response.text();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(text, "text/xml");
                
                const items = Array.from(xmlDoc.querySelectorAll('item'));
                document.getElementById('list-loader').style.display = 'none';
                document.getElementById('total-count').textContent = `총 ${items.length}명의 후보자`;
                
                const listContainer = document.getElementById('item-list');
                
                items.forEach((item, index) => {
                    const title = item.querySelector('title')?.textContent || '제목 없음';
                    const link = item.querySelector('link')?.textContent || '#';
                    
                    // Extract custom tags
                    const tags = {
                        motivation: item.querySelector('motivation')?.textContent || '',
                        experience: item.querySelector('experience')?.textContent || '',
                        plan: item.querySelector('plan')?.textContent || '',
                        project_proposal: item.querySelector('project_proposal')?.textContent || '',
                        leadership_plan: item.querySelector('leadership_plan')?.textContent || ''
                    };
                    
                    // Parse Title to get Org and Name nicely (e.g. "[기관] 이름 - ...")
                    let org = "";
                    let name = title;
                    const match = title.match(/\[(.*?)\] (.*?) -/);
                    if(match) {
                        org = match[1];
                        name = match[2];
                    }

                    // Create list element
                    const li = document.createElement('div');
                    li.className = 'list-item';
                    li.innerHTML = `
                        <div class="list-item-title">${name}</div>
                        <div class="list-item-org">${org}</div>
                    `;
                    
                    li.addEventListener('click', () => {
                        // Handle active state
                        document.querySelectorAll('.list-item').forEach(el => el.classList.remove('active'));
                        li.classList.add('active');
                        
                        showDetails(title, link, tags);
                    });
                    
                    listContainer.appendChild(li);
                });
                
            } catch (error) {
                console.error("Error loading RSS:", error);
                document.getElementById('total-count').textContent = "데이터를 불러오는데 실패했습니다.";
                document.getElementById('list-loader').style.display = 'none';
            }
        });

        function showDetails(title, link, tags) {
            document.getElementById('empty-state').style.display = 'none';
            const card = document.getElementById('content-card');
            
            // Trigger reflow for animation
            card.classList.remove('active');
            void card.offsetWidth; 
            card.classList.add('active');
            
            document.getElementById('detail-title').textContent = title;
            document.getElementById('detail-link').href = link;
            
            const sectionsContainer = document.getElementById('detail-sections');
            sectionsContainer.innerHTML = ''; // Clear previous
            
            const sectionMap = [
                { id: 'motivation', label: '1. 지원동기' },
                { id: 'experience', label: '2. AI·데이터분석 활용 경력 및 실적' },
                { id: 'plan', label: '3. 데이터 분석·AI활용 계획' },
                { id: 'project_proposal', label: '4. 실전 AX 과제 기획서' },
                { id: 'leadership_plan', label: '5. AI·데이터 거점리더 활동계획' }
            ];
            
            sectionMap.forEach(sec => {
                const content = tags[sec.id];
                if(content && content.trim().length > 0) {
                    const sectionEl = document.createElement('div');
                    sectionEl.className = 'section';
                    
                    // Remove Markdown headers from the start if present to avoid duplication
                    let cleanContent = content.trim();
                    cleanContent = cleanContent.replace(/^#+\s+.*?\n/, '');
                    
                    sectionEl.innerHTML = `
                        <h3>${sec.label}</h3>
                        <div class="section-content">${escapeHTML(cleanContent)}</div>
                    `;
                    sectionsContainer.appendChild(sectionEl);
                }
            });
            
            if(sectionsContainer.innerHTML === '') {
                sectionsContainer.innerHTML = '<div class="section"><div class="section-content">상세 내용이 파싱되지 않았거나 비어있습니다. 원본 마크다운 파일을 참조해주세요.</div></div>';
            }
        }
        
        // Simple HTML escaping to prevent XSS and preserve text format
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag])
            );
        }
    </script>
</body>
</html>
